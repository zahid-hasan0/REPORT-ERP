<link rel="stylesheet" href="assets/css/dashboard.css">

<div class="container-fluid p-4">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1 dashboard-title">Dashboard Overview</h2>
        </div>
        <div class="d-flex gap-2">
            <!-- Internal Button Removed -->
        </div>
    </div>

    <!-- Fixed Vibrant Stats Cards -->
    <div class="row g-4 mb-4">
        <!-- Total Bookings -->
        <div class="col-md-3">
            <div class="card vibrant-stat-card gradient-1">
                <div class="vibrant-bg-icon"><i class="fas fa-layer-group"></i></div>
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="vibrant-icon-wrapper">
                            <i class="fas fa-layer-group"></i>
                        </div>
                        <div class="vibrant-text-box">
                            <span class="vibrant-label">Total Bookings</span>
                            <h2 class="vibrant-number" id="totalBookings">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- This Month -->
        <div class="col-md-3">
            <div class="card vibrant-stat-card gradient-2">
                <div class="vibrant-bg-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="vibrant-icon-wrapper">
                            <i class="fas fa-calendar-alt"></i>
                        </div>
                        <div class="vibrant-text-box">
                            <span class="vibrant-label">This Month</span>
                            <h2 class="vibrant-number" id="monthBookings">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Total Customers -->
        <div class="col-md-3">
            <div class="card vibrant-stat-card gradient-3">
                <div class="vibrant-bg-icon"><i class="fas fa-building"></i></div>
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="vibrant-icon-wrapper">
                            <i class="fas fa-building"></i>
                        </div>
                        <div class="vibrant-text-box">
                            <span class="vibrant-label">Total Customers</span>
                            <h2 class="vibrant-number" id="totalCustomers">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Total Buyers -->
        <div class="col-md-3">
            <div class="card vibrant-stat-card gradient-4">
                <div class="vibrant-bg-icon"><i class="fas fa-shopping-bag"></i></div>
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="vibrant-icon-wrapper">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="vibrant-text-box">
                            <span class="vibrant-label">Total Buyers</span>
                            <h2 class="vibrant-number" id="totalBuyers">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <!-- Charts Stacked Vertically -->
    <div class="row g-4">
        <!-- Chart 1: Monthly Booking -->
        <div class="col-12">
            <div class="card monthly-chart-card h-100">
                <div class="card-header bg-white py-3">
                    <h5 class="card-title mb-0 d-flex align-items-center">
                        <i class="fas fa-chart-bar text-primary me-2"></i> Monthly Booking Overview
                    </h5>
                </div>
                <div class="card-body">
                    <div class="chart-wrapper w-100" style="height: 450px;">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart 2: Monthly Customer -->
        <div class="col-12">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white py-3">
                    <h5 class="card-title mb-0 d-flex align-items-center">
                        <i class="fas fa-chart-line text-success me-2"></i> Monthly Customer Activity
                    </h5>
                </div>
                <div class="card-body">
                    <div class="chart-wrapper w-100" style="height: 450px;">
                        <canvas id="customerMonthlyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart 3: Top Customers -->
        <div class="col-12">
            <div class="card h-100">
                <div class="card-header bg-white py-3">
                    <h5 class="card-title mb-0 d-flex align-items-center">
                        <i class="fas fa-chart-pie text-warning me-2"></i> Top Customers Distribution
                    </h5>
                </div>
                <div class="card-body">
                    <div class="chart-wrapper w-100" style="height: 550px;">
                        <canvas id="customerChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart 4: Top Buyers -->
        <div class="col-12">
            <div class="card top-buyers-card h-100">
                <div class="card-header bg-white py-3">
                    <h5 class="card-title mb-0 d-flex align-items-center">
                        <i class="fas fa-chart-pie text-info me-2"></i> Top Buyers Breakdown
                    </h5>
                </div>
                <div class="card-body">
                    <div class="chart-wrapper w-100" style="height: 600px;">
                        <canvas id="buyerChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
