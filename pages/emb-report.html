<link rel="stylesheet" href="assets/css/emb-report.css">
<style>
    /* Premium Styling for EMB Report */
    .emb-container {
        padding: 2rem 1.5rem;
    }

    .report-title-section {
        margin-bottom: 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .report-title {
        font-weight: 800;
        font-size: 1.8rem;
        color: #0f172a;
        margin: 0;
        letter-spacing: -0.5px;
    }

    .stat-card {
        border: none;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        padding: 25px;
        display: flex;
        align-items: center;
        gap: 20px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
    }

    .stat-icon {
        width: 60px;
        height: 60px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        flex-shrink: 0;
    }

    .stat-icon.total {
        background: rgba(2, 132, 199, 0.1);
        color: #0284c7;
    }

    .stat-icon.pending {
        background: rgba(245, 158, 11, 0.1);
        color: #d97706;
    }

    .stat-icon.approved {
        background: rgba(16, 185, 129, 0.1);
        color: #059669;
    }

    .stat-icon.rejected {
        background: rgba(239, 68, 68, 0.1);
        color: #dc2626;
    }

    .stat-info .stat-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #64748b;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 5px;
    }

    .stat-info .stat-value {
        font-size: 2rem;
        font-weight: 800;
        color: #0f172a;
        margin: 0;
        line-height: 1;
    }

    .data-panel {
        background: white;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        overflow: hidden;
        border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .data-header {
        background: #f8fafc;
        padding: 20px 25px;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .data-title {
        font-weight: 700;
        color: #0f172a;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.1rem;
    }

    .search-input {
        background: #ffffff;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 10px 15px 10px 40px;
        font-size: 0.95rem;
        transition: 0.3s;
        width: 300px;
    }

    .search-input:focus {
        border-color: #0284c7;
        box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
        outline: none;
    }

    .search-container {
        position: relative;
    }

    .search-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
    }

    .btn-premium {
        background: linear-gradient(135deg, #0284c7, #38bdf8);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(2, 132, 199, 0.2);
        transition: 0.3s;
    }

    .btn-premium:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(2, 132, 199, 0.3);
        color: white;
    }

    .table-modern {
        margin: 0;
    }

    .table-modern thead th {
        background: #f8fafc;
        color: #475569;
        font-weight: 700;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 15px 20px;
        border-bottom: 2px solid #e2e8f0;
    }

    .table-modern tbody td {
        padding: 16px 20px;
        color: #334155;
        vertical-align: middle;
        border-bottom: 1px solid #f1f5f9;
        font-size: 0.95rem;
    }

    .table-modern tbody tr:hover td {
        background-color: #f8fafc;
    }
</style>

<div id="emb-report-module" class="emb-container">
    <div class="report-title-section">
        <h2 class="report-title">Embellishment Overview</h2>
    </div>

    <!-- Stats Dashboard -->
    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon total">
                    <i class="fas fa-file-invoice"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Total Jobs</div>
                    <div class="stat-value" id="stat-total-reports">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon pending">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Pending</div>
                    <div class="stat-value" id="stat-pending-jobs">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon approved">
                    <i class="fas fa-check-double"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Approved</div>
                    <div class="stat-value" id="stat-approved-jobs">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon rejected">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Rejected</div>
                    <div class="stat-value" id="stat-rejected-jobs">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Database Records Section -->
    <div class="data-panel animate">
        <div class="data-header">
            <h5 class="data-title">
                <i class="fas fa-database text-primary"></i> SUBMISSION RECORDS
            </h5>
            <div class="d-flex gap-3 align-items-center">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search Job, Buyer, WO..."
                        onkeyup="filterTable()">
                </div>
                <button class="btn btn-success btn-sm fw-bold px-3 py-2 rounded-3 shadow-sm border-0" id="whatsappSelectedBtn">
                    <i class="fab fa-whatsapp me-2"></i>Selected
                </button>
                <button class="btn-premium" id="whatsappFullBtn">
                    <i class="fab fa-whatsapp me-2"></i>Full Report
                </button>
            </div>
        </div>

        <div class="px-4 py-3 border-bottom d-flex justify-content-end align-items-center bg-white">
            <span class="text-muted small fw-bold me-2">Show:</span>
            <select class="form-select border-0 bg-light shadow-none" id="pageSizeSelect"
                style="width: 80px; font-weight: 600;">
                <option value="10">10</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
            </select>
        </div>

        <div class="table-responsive">
            <table class="table table-modern mb-0">
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;"></th>
                        <th style="width: 60px; text-align: center;">SL</th>
                        <th>JOB NO</th>
                        <th>BUYER</th>
                        <th>WO #</th>
                        <th>STATUS</th>
                        <th>COMMENTS</th>
                        <th>SUBMITTED</th>
                        <th class="text-end">ACTION</th>
                    </tr>
                </thead>
                <tbody id="dbReportTable">
                    <!-- Data injected securely by JS -->
                </tbody>
            </table>
        </div>
        <div id="dbPagination" class="data-header border-top border-bottom-0 bg-white d-flex justify-content-between">
            <!-- Pagination populated via JS -->
        </div>
    </div>
</div>
