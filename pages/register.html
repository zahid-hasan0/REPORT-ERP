<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | GMS Enterprise</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --accent: #0ea5e9;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .bg-decor {
            position: absolute;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--primary-light);
            filter: blur(150px);
            opacity: 0.1;
            border-radius: 50%;
            animation: float 25s infinite alternate;
        }

        .blob-1 {
            top: -10%;
            right: -10%;
        }

        .blob-2 {
            bottom: -10%;
            left: -10%;
            background: var(--accent);
        }

        @keyframes float {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(50px, 100px) scale(1.1);
            }
        }

        .auth-card {
            width: 100%;
            max-width: 1100px;
            height: 680px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
            display: flex;
        }

        .side-panel {
            flex: 1;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            padding: 60px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .form-panel {
            flex: 1.2;
            padding: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }

        .logo-box {
            width: 70px;
            height: 70px;
            background: #fff;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.04);
            border: 1px solid #f1f5f9;
        }

        .h2-brand {
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .p-muted {
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .form-control {
            border: 2px solid #f1f5f9;
            border-radius: 20px;
            padding: 16px 24px;
            background: #f8fafc;
            color: var(--text-dark);
            transition: all 0.3s;
            font-weight: 500;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.06);
            outline: none;
        }

        .btn-auth {
            background: linear-gradient(to right, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-weight: 700;
            margin-top: 15px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.15);
        }

        .ghost-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 14px 50px;
            color: white;
            font-weight: 700;
            margin-top: 30px;
            text-decoration: none;
            display: inline-block;
        }

        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 992px) {
            .side-panel {
                display: none;
            }

            .auth-card {
                max-width: 500px;
                height: auto;
                padding: 40px;
                border-radius: 30px;
            }

            .form-panel {
                padding: 0;
            }
        }
    </style>
</head>

<body>
    <div class="bg-decor">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="auth-card">
        <div class="side-panel">
            <h1 class="display-5 fw-800 mb-4 h1">Join GMS Pro</h1>
            <p class="lead opacity-90 mb-5 px-4">Already have an account? Sign in to keep your business records up to
                date.</p>
            <a href="login.html" class="ghost-btn">Sign In</a>
        </div>

        <div class="form-panel">
            <div class="form-header text-center">
                <div class="logo-box">
                    <img src="../gms icon.png" alt="GMS" width="45">
                </div>
                <h2 class="h2-brand">Create Account</h2>
                <p class="p-muted">Setup your personal GMS ID today.</p>
            </div>
            <form id="regForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="johndoe123" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required
                        minlength="6">
                </div>
                <button type="submit" class="btn btn-auth">CREATE PROFILE</button>
                <div class="text-center d-lg-none mt-4">
                    <p class="text-muted">Have account? <a href="login.html"
                            class="fw-bold text-primary text-decoration-none">Login</a></p>
                </div>
            </form>
        </div>
    </div>

    <div id="loader">
        <div class="spinner-border text-primary mb-3"></div>
        <div class="h5 fw-bold">PROCEEDING...</div>
    </div>

    <script type="module">
        import { registerUser } from '../js/auth.js';

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const n = document.getElementById('fullName').value.trim();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const l = document.getElementById('loader');

            l.style.display = 'flex';
            try {
                await registerUser(u, p, n);
                alert('Success! Now sign in.');
                window.location.href = 'login.html';
            } catch (err) {
                alert(err.message);
                l.style.display = 'none';
            }
        });
    </script>
</body>

</html>
